name: build

on:
  push:
  pull_request:

jobs:
  maven:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: mvn -B clean package
      - run: npm ci
      - run: npm run mcp:list
